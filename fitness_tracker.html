<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的健身记录</title>
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.header{padding:20px 16px 12px;background:#fff;border-bottom:1px solid #f0f0f0;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:20px;font-weight:600;}
.header .date{font-size:13px;color:#888;margin-top:2px;}
.avatar{width:36px;height:36px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:18px;}
.content{flex:1;padding:16px;overflow-y:auto;}
.bottom-nav{display:flex;background:#fff;border-top:1px solid #f0f0f0;padding:8px 0 20px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;font-size:10px;color:#aaa;cursor:pointer;padding:6px 0;}
.nav-btn.active{color:#1a1a1a;}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor;}
.section{display:none;}
.section.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:#f8f8f8;border-radius:12px;padding:12px 10px;text-align:center;}
.stat-value{font-size:24px;font-weight:600;color:#1a1a1a;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:14px;margin-bottom:12px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:600;}
.btn-link{font-size:13px;color:#888;background:none;border:none;cursor:pointer;}
.empty{text-align:center;padding:24px 0;color:#bbb;font-size:14px;line-height:2;}
.workout-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5;}
.workout-item:last-child{border-bottom:none;}
.workout-date-box{text-align:center;min-width:36px;}
.workout-date-day{font-size:18px;font-weight:600;line-height:1;}
.workout-date-month{font-size:11px;color:#aaa;}
.workout-info{flex:1;}
.workout-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;}
.badge-strength{background:#e8f0fe;color:#1a56c4;}
.badge-cardio{background:#e6f4ea;color:#1a7a40;}
.workout-detail{font-size:12px;color:#999;margin-top:3px;}
.workout-notes{font-size:12px;color:#bbb;margin-top:2px;font-style:italic;}
.delete-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:18px;padding:4px;align-self:center;}
.delete-btn:hover{color:#e74c3c;}
.form-group{margin-bottom:12px;}
.form-label{font-size:13px;color:#666;margin-bottom:5px;display:block;}
input,select,textarea{width:100%;padding:10px 12px;font-size:14px;border:1px solid #e8e8e8;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;}
input:focus,select:focus{border-color:#888;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:10px;font-size:13px;cursor:pointer;border:1px solid #e8e8e8;background:#fff;color:#888;font-weight:500;}
.type-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn-primary{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-primary:active{opacity:0.85;}
.add-ex-btn{padding:8px 14px;background:#f5f5f5;border:none;border-radius:8px;font-size:13px;color:#555;cursor:pointer;margin-bottom:10px;}
.ex-chip{display:flex;align-items:center;background:#f8f8f8;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px;gap:8px;}
.ex-chip span{flex:1;color:#444;}
.ex-chip button{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;}
.save-toast{display:none;text-align:center;color:#1a7a40;font-size:13px;margin-top:8px;padding:8px;background:#e6f4ea;border-radius:8px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
.bar-label{width:56px;color:#888;text-align:right;font-size:12px;}
.bar-track{flex:1;height:22px;background:#f5f5f5;border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:500;min-width:20px;}
.bar-strength{background:#c8d9fc;color:#1a56c4;}
.bar-cardio{background:#b7e4c7;color:#1a7a40;}
.bar-count{font-size:12px;color:#aaa;width:24px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>我的健身记录</h1>
        <div class="date" id="today-str"></div>
      </div>
      <div class="avatar">💪</div>
    </div>
  </div>

  <div class="content">
    <!-- 首页 -->
    <div class="section active" id="tab-home">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value" id="s-total">0</div><div class="stat-label">总次数</div></div>
        <div class="stat-card"><div class="stat-value" id="s-month">0</div><div class="stat-label">本月</div></div>
        <div class="stat-card"><div class="stat-value" id="s-week">0</div><div class="stat-label">本周</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">最近训练</span>
          <button class="btn-link" onclick="go('history')">全部 →</button>
        </div>
        <div id="recent-list"><div class="empty">还没有记录<br>点下方 ＋ 开始第一次训练！</div></div>
      </div>
    </div>

    <!-- 记录 -->
    <div class="section" id="tab-record">
      <div class="card">
        <div class="form-group">
          <label class="form-label">训练名称</label>
          <input type="text" id="r-name" placeholder="例：周三胸肌训练" />
        </div>
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" id="r-date" />
        </div>
        <div class="type-toggle">
          <button class="type-btn active" id="btn-s" onclick="setType('strength')">🏋️ 力量训练</button>
          <button class="type-btn" id="btn-c" onclick="setType('cardio')">🏃 有氧运动</button>
        </div>

        <div id="strength-sec">
          <div class="form-label">选择动作</div>
          <div class="form-row" style="margin-bottom:8px;">
            <div class="form-group">
              <select id="ex-name">
                <option value="">选择动作</option>
                <optgroup label="胸部"><option>卧推</option><option>上斜哑铃</option><option>飞鸟</option></optgroup>
                <optgroup label="背部"><option>引体向上</option><option>硬拉</option><option>坐姿划船</option></optgroup>
                <optgroup label="腿部"><option>深蹲</option><option>腿举</option><option>弓步</option></optgroup>
                <optgroup label="肩膀"><option>肩推</option><option>侧平举</option></optgroup>
                <optgroup label="手臂"><option>二头弯举</option><option>三头下压</option></optgroup>
                <optgroup label="核心"><option>平板支撑</option><option>卷腹</option></optgroup>
              </select>
            </div>
            <div class="form-group" style="max-width:70px;"><input type="number" id="ex-sets" placeholder="组" min="1"/></div>
            <div class="form-group" style="max-width:70px;"><input type="number" id="ex-reps" placeholder="次" min="1"/></div>
            <div class="form-group" style="max-width:80px;"><input type="number" id="ex-weight" placeholder="kg" min="0" step="0.5"/></div>
          </div>
          <button class="add-ex-btn" onclick="addEx()">＋ 添加动作</button>
          <div id="ex-list"></div>
        </div>

        <div id="cardio-sec" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">运动类型</label>
              <select id="c-type"><option>跑步</option><option>骑车</option><option>游泳</option><option>跳绳</option><option>椭圆机</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">时长（分钟）</label>
              <input type="number" id="c-dur" placeholder="30" min="1"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">距离（km，可选）</label>
            <input type="number" id="c-dist" placeholder="5.0" step="0.1" min="0"/>
          </div>
        </div>

        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">备注（可选）</label>
          <input type="text" id="r-notes" placeholder="今天感觉如何..." />
        </div>
      </div>
      <button class="btn-primary" onclick="save()">✓ 保存训练记录</button>
      <div class="save-toast" id="toast">已保存！数据存在本地，不会丢失 ✓</div>
    </div>

    <!-- 历史 -->
    <div class="section" id="tab-history">
      <div class="card">
        <div class="card-header"><span class="card-title">全部训练记录</span></div>
        <div id="history-list"><div class="empty">暂无记录</div></div>
      </div>
    </div>

    <!-- 统计 -->
    <div class="section" id="tab-stats">
      <div class="stat-grid" style="grid-template-columns:1fr 1fr;margin-bottom:12px;">
        <div class="stat-card"><div class="stat-value" id="st-strength">0</div><div class="stat-label">力量训练次数</div></div>
        <div class="stat-card"><div class="stat-value" id="st-cardio">0</div><div class="stat-label">有氧运动次数</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">最近4周频次</span></div>
        <div id="week-bars"><div class="empty">暂无数据</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">最常练动作 Top 5</span></div>
        <div id="top-ex"><div class="empty">暂无数据</div></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="go('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      首页
    </button>
    <button class="nav-btn" id="nav-record" onclick="go('record')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      记录
    </button>
    <button class="nav-btn" id="nav-history" onclick="go('history')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      历史
    </button>
    <button class="nav-btn" id="nav-stats" onclick="go('stats')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      统计
    </button>
  </div>
</div>

<script>
let workouts = JSON.parse(localStorage.getItem('fitness_workouts') || '[]');
let tempEx = [];
let curType = 'strength';

const today = new Date();
document.getElementById('today-str').textContent = today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('r-date').value = today.toISOString().split('T')[0];

function save2storage(){ localStorage.setItem('fitness_workouts', JSON.stringify(workouts)); }

function go(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='home') renderHome();
  if(tab==='history') renderHistory();
  if(tab==='stats') renderStats();
}

function setType(t){
  curType=t;
  document.getElementById('btn-s').classList.toggle('active',t==='strength');
  document.getElementById('btn-c').classList.toggle('active',t==='cardio');
  document.getElementById('strength-sec').style.display=t==='strength'?'block':'none';
  document.getElementById('cardio-sec').style.display=t==='cardio'?'block':'none';
}

function addEx(){
  const n=document.getElementById('ex-name').value;
  if(!n) return;
  tempEx.push({name:n, sets:document.getElementById('ex-sets').value||'?', reps:document.getElementById('ex-reps').value||'?', weight:document.getElementById('ex-weight').value||0});
  renderExList();
  ['ex-name','ex-sets','ex-reps','ex-weight'].forEach(id=>document.getElementById(id).value='');
}
function removeEx(i){ tempEx.splice(i,1); renderExList(); }
function renderExList(){
  document.getElementById('ex-list').innerHTML = tempEx.map((e,i)=>
    `<div class="ex-chip"><span>${e.name} — ${e.sets}组×${e.reps}次${e.weight&&e.weight!=0?' / '+e.weight+'kg':''}</span><button onclick="removeEx(${i})">×</button></div>`
  ).join('');
}

function save(){
  const name = document.getElementById('r-name').value || (curType==='strength'?'力量训练':'有氧运动');
  const date = document.getElementById('r-date').value || today.toISOString().split('T')[0];
  if(curType==='strength'&&!tempEx.length){ alert('请至少添加一个动作'); return; }
  let w = {id:Date.now(), name, date, type:curType, notes:document.getElementById('r-notes').value};
  if(curType==='strength'){ w.exercises=[...tempEx]; }
  else { w.cardioType=document.getElementById('c-type').value; w.duration=document.getElementById('c-dur').value; w.distance=document.getElementById('c-dist').value; }
  workouts.unshift(w);
  save2storage();
  tempEx=[]; renderExList();
  ['r-name','r-notes','c-dur','c-dist'].forEach(id=>document.getElementById(id).value='');
  const t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
  renderHome();
}

function renderHome(){
  const now=new Date();
  const ms=new Date(now.getFullYear(),now.getMonth(),1);
  const ws=new Date(now); ws.setDate(now.getDate()-now.getDay());
  document.getElementById('s-total').textContent=workouts.length;
  document.getElementById('s-month').textContent=workouts.filter(w=>new Date(w.date)>=ms).length;
  document.getElementById('s-week').textContent=workouts.filter(w=>new Date(w.date)>=ws).length;
  const el=document.getElementById('recent-list');
  const r=workouts.slice(0,3);
  if(!r.length){el.innerHTML='<div class="empty">还没有记录<br>点下方 ＋ 开始第一次训练！</div>';return;}
  el.innerHTML=r.map(w=>workoutHTML(w)).join('');
}

function workoutHTML(w,showDel=false){
  const d=new Date(w.date);
  const summary=w.type==='strength'?(w.exercises||[]).map(e=>e.name).join('、'):`${w.cardioType} ${w.duration||0}分钟${w.distance?' / '+w.distance+'km':''}`;
  return `<div class="workout-item">
    <div class="workout-date-box"><div class="workout-date-day">${d.getDate()}</div><div class="workout-date-month">${d.getMonth()+1}月</div></div>
    <div class="workout-info">
      <div class="workout-name">${w.name} <span class="badge ${w.type==='strength'?'badge-strength':'badge-cardio'}">${w.type==='strength'?'力量':'有氧'}</span></div>
      <div class="workout-detail">${summary||'—'}</div>
      ${w.notes?`<div class="workout-notes">${w.notes}</div>`:''}
    </div>
    ${showDel?`<button class="delete-btn" onclick="del(${w.id})">🗑</button>`:''}
  </div>`;
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!workouts.length){el.innerHTML='<div class="empty">暂无记录</div>';return;}
  el.innerHTML=workouts.map(w=>workoutHTML(w,true)).join('');
}

function del(id){
  if(!confirm('确定删除这条记录？')){return;}
  workouts=workouts.filter(w=>w.id!==id);
  save2storage(); renderHistory(); renderHome();
}

function renderStats(){
  document.getElementById('st-strength').textContent=workouts.filter(w=>w.type==='strength').length;
  document.getElementById('st-cardio').textContent=workouts.filter(w=>w.type==='cardio').length;
  const now=new Date();
  const weeks=[0,1,2,3].map(i=>{
    const we=new Date(now); we.setDate(now.getDate()-i*7);
    const ws=new Date(we); ws.setDate(we.getDate()-6);
    return{label:`${we.getMonth()+1}/${we.getDate()}`,count:workouts.filter(w=>{const d=new Date(w.date);return d>=ws&&d<=we;}).length};
  }).reverse();
  const maxW=Math.max(...weeks.map(w=>w.count),1);
  const wb=document.getElementById('week-bars');
  if(!workouts.length){wb.innerHTML='<div class="empty">暂无数据</div>';}
  else wb.innerHTML=weeks.map(w=>`<div class="bar-row"><span class="bar-label">${w.label}</span><div class="bar-track"><div class="bar-fill bar-strength" style="width:${Math.round(w.count/maxW*100)}%">${w.count>0?w.count+'次':''}</div></div><span class="bar-count">${w.count}</span></div>`).join('');
  const exCount={};
  workouts.filter(w=>w.type==='strength').forEach(w=>(w.exercises||[]).forEach(e=>{exCount[e.name]=(exCount[e.name]||0)+1;}));
  const sorted=Object.entries(exCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const te=document.getElementById('top-ex');
  if(!sorted.length){te.innerHTML='<div class="empty">暂无数据</div>';}
  else{const maxE=sorted[0][1];te.innerHTML=sorted.map(([n,c])=>`<div class="bar-row"><span class="bar-label" style="width:60px;font-size:12px;">${n}</span><div class="bar-track"><div class="bar-fill bar-cardio" style="width:${Math.round(c/maxE*100)}%">${c}次</div></div><span class="bar-count">${c}</span></div>`).join('');}
}

renderHome();
</script>
</body>
</html>
